<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="night" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#132019"/>
      <stop offset="0.5" stop-color="#151a15"/>
      <stop offset="1" stop-color="#201813"/>
    </linearGradient>
    <radialGradient id="moonglow" cx="0.8" cy="0.14" r="0.45">
      <stop offset="0" stop-color="#f5d9a0" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#f5d9a0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="tealglow" cx="0.12" cy="0.82" r="0.55">
      <stop offset="0" stop-color="#14b8a6" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <filter id="dsoft" x="-40%" y="-40%" width="180%" height="180%"><feGaussianBlur stdDeviation="7"/></filter>
    <filter id="dsofter" x="-60%" y="-60%" width="220%" height="220%"><feGaussianBlur stdDeviation="18"/></filter>
    <g id="dleaf">
      <path d="M0,0 C34,-52 108,-58 150,-6 C112,52 36,54 0,0 Z"/>
      <path d="M8,-2 C56,-18 100,-20 142,-6" fill="none" stroke="#5eead4" stroke-opacity="0.35" stroke-width="3"/>
    </g>
    <g id="dbranch">
      <path d="M0,0 C60,-40 140,-70 260,-80" fill="none" stroke="#2d6a58" stroke-width="6" stroke-linecap="round"/>
      <use href="#dleaf" transform="translate(40,-22) rotate(-40) scale(0.42)"/>
      <use href="#dleaf" transform="translate(85,-40) rotate(15) scale(0.48)"/>
      <use href="#dleaf" transform="translate(135,-58) rotate(-35) scale(0.52)"/>
      <use href="#dleaf" transform="translate(185,-70) rotate(20) scale(0.55)"/>
      <use href="#dleaf" transform="translate(235,-78) rotate(-25) scale(0.5)"/>
    </g>
  </defs>

  <rect width="1600" height="1000" fill="url(#night)"/>
  <rect width="1600" height="1000" fill="url(#moonglow)"/>
  <rect width="1600" height="1000" fill="url(#tealglow)"/>

  <!-- far foliage masses -->
  <g filter="url(#dsofter)">
    <ellipse cx="180" cy="900" rx="480" ry="330" fill="#1d4a3c" opacity="0.95"/>
    <ellipse cx="1520" cy="130" rx="420" ry="300" fill="#235544" opacity="0.8"/>
    <ellipse cx="1350" cy="960" rx="520" ry="300" fill="#1a3f32" opacity="0.9"/>
    <ellipse cx="620" cy="40" rx="360" ry="220" fill="#20463a" opacity="0.7"/>
  </g>

  <!-- mid-ground branches -->
  <g filter="url(#dsoft)">
    <g transform="translate(-40,760) scale(2.1)" fill="#2e7a63" opacity="0.95"><use href="#dbranch"/></g>
    <g transform="translate(1660,300) scale(-2.4,2.4) rotate(18)" fill="#286752" opacity="0.85"><use href="#dbranch"/></g>
    <g transform="translate(240,1030) scale(1.7) rotate(-24)" fill="#349070" opacity="0.9"><use href="#dbranch"/></g>
    <g transform="translate(1680,1020) scale(-1.9,1.9) rotate(-10)" fill="#2a705a" opacity="0.9"><use href="#dbranch"/></g>
    <g transform="translate(900,-60) scale(1.5) rotate(150)" fill="#245646" opacity="0.8"><use href="#dbranch"/></g>
  </g>

  <!-- floating leaves -->
  <g fill="#3aa583" opacity="0.7" filter="url(#dsoft)">
    <use href="#dleaf" transform="translate(430,300) rotate(-30) scale(0.9)"/>
    <use href="#dleaf" transform="translate(1150,720) rotate(35) scale(1.1)"/>
    <use href="#dleaf" transform="translate(1300,420) rotate(-15) scale(0.7)"/>
    <use href="#dleaf" transform="translate(250,540) rotate(60) scale(0.8)"/>
  </g>

  <!-- warm bokeh (fireflies / evening light) -->
  <g filter="url(#dsoft)">
    <circle cx="1080" cy="180" r="40" fill="#fbbf24" opacity="0.4"/>
    <circle cx="920" cy="330" r="22" fill="#fde68a" opacity="0.42"/>
    <circle cx="560" cy="150" r="30" fill="#f59e0b" opacity="0.32"/>
    <circle cx="1420" cy="620" r="34" fill="#fbbf24" opacity="0.32"/>
    <circle cx="180" cy="330" r="26" fill="#fde68a" opacity="0.36"/>
    <circle cx="760" cy="860" r="38" fill="#2dd4bf" opacity="0.3"/>
    <circle cx="1240" cy="900" r="20" fill="#fbbf24" opacity="0.36"/>
  </g>
</svg>
